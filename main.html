<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | A05-B13-Juhairul</title>
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- favicon  -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- internal css -->

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


</head>

<body>

    <!-- nav section -->
    <header>
        <div class="flex flex-col md:flex-row justify-between bg-base-100 shadow-sm">
            <div class="navbar justify-center md:justify-between">
                <div class="flex items-center ml-0  md:ml-8  ">
                    <img class="w-[1em] md:w-[2em]" w src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-[63%]  md:text-xl pl-1 pr-0 ">GitHub Issues Tracker</a>
                </div>
               
            </div>

             <div class="flex flex-col md:flex-row mx-8  gap-2 mt-0 mr-8 items-center">
                    <label class="input w-[8em] md:w-[15em] h-[2em] md:h-[2.5em] ">
                        <svg class="h-[1.5em] opacity-50 " xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.3-4.3"></path>
                            </g>
                        </svg>
                        <input type="search" required placeholder="Search issues..." />
                    </label>
                    <div class="justify-center">
                        <div tabindex="0" role="button" class="">
                            <div class="">
                                <button class="bg-[#4A00FF] text-white p-2 rounded h-[2.5em] md:h-[2.7em] w-[7em] text-center text-[0.8em] md:text-sm mb-2 md:mb-0">+ New Issue</button>
                            </div>
                        </div>

                    </div>
                </div>
        </div>
    </header>


    <script src="./script.js"></script>
</body>

</html>
