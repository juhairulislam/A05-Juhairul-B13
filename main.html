<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | A05-B13-Juhairul</title>
    <!-- tailwind and daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- favicon  -->
    <!-- <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon"> -->

    <!-- internal css -->

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


</head>

<body>

    <!-- nav section -->
    <header>
        <div class="flex flex-col md:flex-row justify-between bg-base-100 shadow-sm">
            <div class="navbar justify-center md:justify-between">
                <div class="flex items-center ml-0  md:ml-8  ">
                    <img class="w-[2em] md:w-[2em]" w src="./assets/github-logo.png" alt="">
                    <a class="btn btn-ghost text-[2em]  md:text-xl pl-1 pr-0 ">GitHub Issues Tracker</a>
                </div>

            </div>

            <div class="flex  mx-8  gap-2 mt-4 md:mt-0 mr-8 items-center justify-center mb-4 md:mb-0">
                <label class="input w-[15em] h-[2.5em] ">
                    <svg class="h-[1.5em] opacity-50 " xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                </label>
                <div class="justify-center">
                    <div tabindex="0" role="button" class="">
                        <div class="">
                            <button id="btn-search"
                                class="bg-[#4A00FF] text-white p-2 rounded h-[2.7em] w-[7em] text-center text-[0.8em] md:text-sm mb-0">+
                                New Issue</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </header>


    <main class="container mx-auto ">

        <!-- three button -->

        <div id="btn-container" class=" shadow rounded mt-10 mb-4 p-5 ">

            <button id="all-btn" onclick="clickedBtn('all')"
                class="border-1 border-gray-200 px-6 rounded text-white mr-2 bg-[#4A00FF]">All</button>
            <button id="open-btn" onclick="clickedBtn('open')"
                class="border-1 border-gray-200 px-6 rounded text-[#64748B] mr-2">Open</button>
            <button id="closed-btn" onclick="clickedBtn('closed')"
                class="border-1 border-gray-200 px-6 rounded text-[#64748B] mr-2">Closed</button>

        </div>


        <!-- issues container -->
        <section class="shadow rounded p-2 flex justify-between">

            <!-- issues left container -->
            <div class="flex items-center gap-2">
                <!-- issues image -->
                <div
                    class="bg-[#ECE4FF] rounded-full w-[2.2em] md:w-[3em] h-[2.2em] md:h-[3em] flex items-center justify-center">
                    <img class="w-[1.6em] md:w-[2em] h-[1.6em] md:h-[2em] " src="./assets/Aperture.png" alt="">


                </div>

                <!-- issues text left -->

                <div class="">
                    <p class="font-bold"><span id="issue-count">50</span> Issues</p>
                    <p class="text-[11px] md:text-[14px] text-[#64748B]">Track and manage your project issues</p>
                </div>

            </div>


            <!-- issues right container -->
            <div class="flex items-center gap-1 ">
                <div class="bg-[#00A96E] w-[0.5em] h-[0.5em] rounded-full"></div>
                <p class="text-[12px] font-semibold mr-2">Open</p>

                <div class="flex items-center gap-1">
                    <div class="bg-[#A855F7] w-[0.5em] h-[0.5em] rounded-full"></div>
                    <p class="text-[12px] font-semibold">Closed</p>
                </div>
            </div>



        </section>


        <!-- all card container -->

        <section class=" ">
            <section id="all-card-container" class="grid grid-cols-1 md:grid-cols-4 gap-4 shadow rounded p-8 md:p-4">





            </section>

            <div id="spinner" class="flex justify-center items-center p-30 hidden">
                <span class="loading loading-dots loading-xl"></span>

            </div>
        </section>





    </main>



    <!-- Open the modal using ID.showModal() method -->
    <button class="btn" onclick="card_modal.showModal()">open modal</button>
    <dialog id="card_modal" class="modal">
        <div class="modal-box">

            <!-- modal header -->

            <div class="space-y-4 text-center ">

                <h1 class="font-bold  text-left text-[1.5em]">Fix broken image uploads</h1>

                <div class="flex gap-1.5">
                    <button class="rounded-2xl text-[0.8em] text-white bg-[#00A96E] px-3 py-1">Opened</button>
                    <p class=" py-1 text-[0.8em] font-bold text-[#64748B]">•</p>
                    <p class=" py-1 text-[0.8em] text-[#64748B]">Opened by Fahim Ahmed</p>
                    <p class=" py-1 text-[0.8em] font-bold text-[#64748B]">•</p>
                    <p class=" py-1 text-[0.8em] text-[#64748B]">1/2/3</p>
                </div>
            </div>

            <!-- labels -->
            <div class="my-6 flex gap-1">
                <button class="border-2 text-[0.8em] border-red-200 text-red-400 bg-red-100 rounded-2xl px-2 py-0.2">BUG</button>
                <button class="border-2 text-[0.8em] border-[#FDE68A] rounded-2xl bg-[#FFF8DB] text-[#D97706] px-2 py-0.2">HELP WANTED</button>
            </div>

            <!-- description -->
             <div>
                <p class="text-[#64748B] text-[0.9em] ">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
             </div>

             <!-- assignee and priority box -->
              <div class="bg-gray-50 rounded-md p-4 my-4 flex gap-30">

                <div class="">
                    <p class="text-[#64748B] text-[0.8em]">Assignee:</p>
                    <p class="font-semibold text-[0.9em]">Fahim Ahmed</p>
                </div>

                <div class="">
                    <p class="text-[#64748B] text-[0.8em]">Priority:</p>
                    <button class="px-3  py-0.2 text-[0.7em] bg-red-500 rounded-2xl text-white">HIGH</button>
                </div>
              </div>



            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn btn-primary">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="./script.js"></script>
</body>

</html>
